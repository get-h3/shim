[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "{{MODULE_PATH}}"
version = "0.1.0"
description = "H3 echo harness — generated by hermes-h3 scaffold --lang py"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn>=0.27.0",
    "pydantic>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["."]
include = ["main.py"]