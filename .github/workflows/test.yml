name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e '.[dev]'

      - name: Lint
        run: .venv/bin/python -m ruff check src/ tests/

      - name: Build check
        run: .venv/bin/python -c "import h3_shim"

      - name: Test
        run: .venv/bin/python -m pytest -x --tb=short -q
