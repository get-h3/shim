name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e '.[dev]'

      - name: Lint
        run: .venv/bin/python -m ruff check src/ tests/

      - name: Build check
        run: .venv/bin/python -c "import h3_shim"

      - name: Test
        run: .venv/bin/python -m pytest -x --tb=short -q

  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sdk-go
        uses: actions/checkout@v4
        with:
          repository: get-h3/sdk-go
          path: sdk-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Go echo harness
        run: |
          cd sdk-go/examples/echo
          go build -o echo-server .

      - name: Start echo server
        run: |
          nohup ./sdk-go/examples/echo/echo-server > /tmp/echo-server.log 2>&1 &
          echo $! > /tmp/echo-server.pid

      - name: Wait for server
        run: sleep 2 && curl --retry 5 --retry-delay 1 http://localhost:9191/health

      - name: Install shim
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e '.[dev]'

      - name: Run compliance tests
        run: .venv/bin/h3-test --endpoint http://localhost:9191

      - name: Kill echo server
        if: always()
        run: |
          kill $(cat /tmp/echo-server.pid) 2>/dev/null || true
