name: Sync Protocol

on:
  repository_dispatch:
    types: [protocol-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout shim
        uses: actions/checkout@v4

      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          repository: get-h3/protocol
          path: protocol-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install shim
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e '.[dev]'

      - name: Sync check — verify schema compatibility
        run: .venv/bin/python scripts/sync_protocol.py --schema-dir protocol-src/schemas/v1 --diff

      - name: Run unit tests
        run: .venv/bin/python -m pytest -x --tb=short -q

      - name: Checkout sdk-go
        uses: actions/checkout@v4
        with:
          repository: get-h3/sdk-go
          path: sdk-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Go echo harness
        run: |
          cd sdk-go/examples/echo
          go build -o echo-server .

      - name: Start echo server
        run: |
          nohup ./sdk-go/examples/echo/echo-server > /tmp/echo-server.log 2>&1 &
          echo $! > /tmp/echo-server.pid

      - name: Wait for server
        run: sleep 2 && curl --retry 5 --retry-delay 1 http://localhost:9191/health

      - name: Run compliance tests
        run: .venv/bin/h3-test --endpoint http://localhost:9191

      - name: Kill echo server
        if: always()
        run: kill $(cat /tmp/echo-server.pid) 2>/dev/null || true

      - name: Read protocol version
        id: version
        run: |
          PROTO_VER=$(grep -A1 'protocol:' protocol-src/versions.yaml | tail -1 | awk '{print $2}' | tr -d '"')
          echo "protocol_version=${PROTO_VER}" >> $GITHUB_OUTPUT
          echo "Protocol version: ${PROTO_VER}"

      - name: Tag release
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${{ steps.version.outputs.protocol_version }}.0"
          git push origin "v${{ steps.version.outputs.protocol_version }}.0"

      - name: Build package
        run: .venv/bin/pip install build && .venv/bin/python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
